<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Scoreboard</title>
    <link href="css/global.css" rel="stylesheet" type="text/css">
  </head>
  <body>
    <div class="app">
      <header class="header">
        <h1 class="header__title">Scoreboard</h1>
        <button class="btn-reset" id="resetBtn">Reset</button>
      </header>

      <main class="board">
        <div class="player player--left">
          <input
            class="player__name"
            type="text"
            placeholder="Player 1"
            maxlength="20"
            autocomplete="off"
            spellcheck="false"
            aria-label="Player 1 name"
          >
          <div class="player__score-wrap">
            <button class="score-btn score-btn--minus" data-player="1" aria-label="Decrease score">&#8722;</button>
            <span class="player__score" id="score1">0</span>
            <button class="score-btn score-btn--plus" data-player="1" aria-label="Increase score">+</button>
          </div>
        </div>

        <div class="divider">
          <span class="divider__label">VS</span>
        </div>

        <div class="player player--right">
          <input
            class="player__name"
            type="text"
            placeholder="Player 2"
            maxlength="20"
            autocomplete="off"
            spellcheck="false"
            aria-label="Player 2 name"
          >
          <div class="player__score-wrap">
            <button class="score-btn score-btn--minus" data-player="2" aria-label="Decrease score">&#8722;</button>
            <span class="player__score" id="score2">0</span>
            <button class="score-btn score-btn--plus" data-player="2" aria-label="Increase score">+</button>
          </div>
        </div>
      </main>

      <footer class="footer">
        <p class="footer__hint">Tap <strong>+</strong> or <strong>&minus;</strong> to update scores</p>
      </footer>
    </div>

    <script src="js/app.js"></script>
  </body>
</html>
